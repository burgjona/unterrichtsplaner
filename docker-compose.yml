services:
  app:
    build: .
    image: lehrer-dashboard:latest
    container_name: lehrer-dashboard
    restart: unless-stopped
    environment:
      # Pflicht: base64-kodierte 32 Byte. Erzeugen:
      #   python -c "import os,base64;print(base64.b64encode(os.urandom(32)).decode())"
      APP_SECRET_KEY: ${APP_SECRET_KEY:?bitte in .env setzen}
      COOKIE_SECURE: "1"            # Cookies nur über HTTPS (Cloudflare Tunnel liefert HTTPS)
      SESSION_TTL_HOURS: "168"
    volumes:
      # Named Volumes: Docker verwaltet den Speicher selbst (unter /volume1/@docker/volumes).
      # Robust gegen Synology-Freigabe-ACLs, die das Schreiben in per File Station angelegte
      # Bind-Mount-Ordner selbst fuer root blockieren ("unable to open database file").
      - ldb_data:/data              # persistente SQLite-DB (data.db)
      - ldb_storage:/storage        # Materialdateien
    # Synology: als root laufen, damit der Container in die per File Station
    # angelegten Bind-Mount-Ordner (./data, ./storage) schreiben darf. Ohne das
    # scheitert SQLite mit "unable to open database file" (uid 1000 hat keine Rechte).
    user: "0:0"
    ports:
      - "127.0.0.1:8097:8000"       # nur lokal erreichbar; der Tunnel greift intern zu

  # Cloudflare Tunnel als Sidecar (Token aus dem Cloudflare-Zero-Trust-Dashboard).
  # Der Tunnel zeigt im Dashboard auf den Service:  http://app:8000
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: lehrer-dashboard-tunnel
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - app

volumes:
  ldb_data:
  ldb_storage:
